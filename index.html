.me-dot{width:16px;height:16px;border-radius:50%;background:#1a73e8;
        border:3px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.25),0 2px 6px rgba(0,0,0,.4)}
.me-ring{animation:pulse 2s ease-out infinite}
@keyframes pulse{
  0%{transform:scale(.55);opacity:.75}
  100%{transform:scale(2.6);opacity:0}
}

/* 現在地ボタン */
#gps{position:absolute;right:12px;bottom:calc(88px + env(safe-area-inset-bottom));
     width:48px;height:48px;border-radius:50%;border:none;background:#fff;
     box-shadow:0 2px 10px rgba(0,0,0,.3);cursor:pointer;z-index:1000;
     display:flex;align-items:center;justify-content:center;font-size:1.35rem}
#gps.on{background:#1a73e8}
#gps.on svg{fill:#fff}
#gps svg{width:24px;height:24px;fill:#444}
#gps.busy{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#near{position:absolute;left:10px;right:70px;bottom:calc(88px + env(safe-area-inset-bottom));

    html: '<div class="pin" style="width:13px;height:13px;background:' + COLORS[s.pref] + '"></div>',
    iconSize:[13,13], iconAnchor:[6.5,6.5], className:''
  });
  var q = encodeURIComponent('ゴールドジム ' + s.name + ' ' + s.addr);
  s.marker = L.marker([s.lat, s.lng], {icon:icon}).bindPopup(
    '<div class="pop"><b>' + s.name + '</b><div class="ad">' + s.addr + '</div>' +
    '<a class="lk" href="https://www.google.com/maps/search/?api=1&query=' + q +
    '" target="_blank">地図アプリで開く</a></div>'
  ).addTo(groups[s.pref]);
});

document.querySelectorAll('.lg').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var g = groups[btn.dataset.pref];
    if (map.hasLayer(g)) { map.removeLayer(g); btn.classList.add('off'); }
    else { map.addLayer(g); btn.classList.remove('off'); }
  });
});

map.fitBounds(L.latLngBounds(STORES.map(function(s){return [s.lat,s.lng];})).pad(0.06));

// ---- 2点間の距離を計算（ヒュベニの公式の簡易版・ハーバサイン） ----
function distanceKm(lat1, lng1, lat2, lng2) {
  var R = 6371;                       // 地球の半径(km)
  var toRad = Math.PI / 180;
  var dLat = (lat2 - lat1) * toRad;
  var dLng = (lng2 - lng1) * toRad;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(lat1*toRad) * Math.cos(lat2*toRad) *
          Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ---- 現在地機能 ----
var meMarker = null, meCircle = null, watchId = null, tracking = false;
var gpsBtn  = document.getElementById('gps');
var nearBox = document.getElementById('near');

function showMe(lat, lng, accuracy) {
  if (meMarker) { map.removeLayer(meMarker); }
  if (meCircle) { map.removeLayer(meCircle); }

  var icon = L.divIcon({
    html: '<div style="position:relative">' +
          '<div class="me-dot"></div>' +
          '<div class="me-ring" style="position:absolute;top:-2px;left:-2px;' +
          'width:20px;height:20px;border-radius:50%;background:rgba(26,115,232,.4)"></div>' +
          '</div>',
    iconSize:[16,16], iconAnchor:[8,8], className:''
  });
  meMarker = L.marker([lat,lng], {icon:icon, zIndexOffset:1000}).addTo(map);

  // 精度の円（誤差範囲）
  if (accuracy && accuracy < 2000) {
    meCircle = L.circle([lat,lng], {
      radius: accuracy, color:'#1a73e8', weight:1,
      fillColor:'#1a73e8', fillOpacity:.10
    }).addTo(map);
  }

  // 最寄り店舗を探す
  var nearest = null, minDist = Infinity;
  STORES.forEach(function(s) {
    var d = distanceKm(lat, lng, s.lat, s.lng);
    if (d < minDist) { minDist = d; nearest = s; }
  });

  if (nearest) {
    document.getElementById('near-nm').textContent = nearest.name;
    var txt = minDist < 1
      ? '直線距離 約 ' + Math.round(minDist*1000) + ' m'
      : '直線距離 約 ' + minDist.toFixed(1) + ' km';
    document.getElementById('near-ds').textContent = txt + '（' + nearest.pref + '）';
    nearBox.style.display = 'block';
  }
}

gpsBtn.addEventListener('click', function() {
  if (!navigator.geolocation) {
    alert('このブラウザは位置情報に対応していません。');
    return;
  }

  // 追跡中ならオフにする
  if (tracking) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null; tracking = false;
    gpsBtn.classList.remove('on');
    if (meMarker) { map.removeLayer(meMarker); meMarker = null; }
    if (meCircle) { map.removeLayer(meCircle); meCircle = null; }
    nearBox.style.display = 'none';
    return;
  }

  gpsBtn.classList.add('busy');
  var first = true;

  watchId = navigator.geolocation.watchPosition(
    function(pos) {
      gpsBtn.classList.remove('busy');
      gpsBtn.classList.add('on');
      tracking = true;
      var c = pos.coords;
      showMe(c.latitude, c.longitude, c.accuracy);
      if (first) { map.setView([c.latitude, c.longitude], 13); first = false; }
    },
    function(err) {
      gpsBtn.classList.remove('busy');
      tracking = false;
      var msg = '位置情報を取得できませんでした。';
      if (err.code === 1) msg = '位置情報の利用が許可されていません。\n\niPhoneの「設定」→「Safari」→「位置情報」で許可してください。';
      else if (err.code === 3) msg = '位置情報の取得がタイムアウトしました。';
      alert(msg);
    },
    { enableHighAccuracy:true, timeout:15000, maximumAge:5000 }
  );
});
</script>
